<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกแก๊สซิไฟเออร์ - บริษัท สยามโกลด์เอ็นเนอจี่ จำกัด</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">

    <!-- เมนูนำทาง (Navigation) -->
    <div class="max-w-6xl mx-auto mb-4 flex gap-4">
        <a href="index.html" class="text-blue-600 font-bold hover:underline">🏠 กลับหน้าหลัก</a>
        <a href="employees.html" class="text-gray-500 hover:underline">← ไปหน้าพนักงาน</a>
        <a href="engine_logs.html" class="text-gray-500 hover:underline">← ไปหน้าเครื่องยนต์</a>
    </div>

    <div class="max-w-6xl mx-auto bg-white p-8 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">บันทึกการทำงานแก๊สซิไฟเออร์ (Gasifier Logs)</h2>
        
        <!-- ฟอร์มกรอกข้อมูล -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-4">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">วัน-เวลาที่บันทึก (recorded_at) *</label>
                <input type="datetime-local" id="logDatetime" class="border rounded w-full py-2 px-3 text-gray-700 focus:outline-none focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Stock In</label>
                <input type="number" step="any" id="stockIn" placeholder="0.00" class="border rounded w-full py-2 px-3 text-gray-700 focus:outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Furnace Out</label>
                <input type="number" step="any" id="furnaceOut" placeholder="0.00" class="border rounded w-full py-2 px-3 text-gray-700 focus:outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Charcoal</label>
                <input type="number" step="any" id="charcoal" placeholder="0.00" class="border rounded w-full py-2 px-3 text-gray-700 focus:outline-none focus:border-blue-500">
            </div>

            <!-- กล่องแสดงรายชื่อพนักงานแบบ Checkbox -->
            <div class="lg:col-span-2 row-span-2">
                <label class="block text-gray-700 text-sm font-bold mb-2">พนักงานผู้บันทึก *</label>
                <div id="empCheckboxContainer" class="border rounded w-full p-3 text-gray-700 bg-white h-32 overflow-y-auto space-y-2 focus-within:border-blue-500">
                    <span class="text-gray-400 text-sm">-- กำลังโหลดรายชื่อ --</span>
                </div>
            </div>
            
            <!-- Note -->
            <div class="md:col-span-2 lg:col-span-3 mt-2">
                <label class="block text-gray-700 text-sm font-bold mb-2">หมายเหตุ (Note)</label>
                <input type="text" id="logNote" placeholder="รายละเอียดเพิ่มเติม..." class="border rounded w-full py-2 px-3 text-gray-700 focus:outline-none focus:border-blue-500">
            </div>
        </div>

        <div class="mb-8 flex gap-2">
            <button id="saveBtn" onclick="saveData()" class="bg-blue-600 text-white font-bold py-2 px-6 rounded hover:bg-blue-700 transition duration-200">
                บันทึกข้อมูล
            </button>
            <button id="cancelBtn" onclick="cancelEdit()" class="bg-gray-400 text-white font-bold py-2 px-6 rounded hover:bg-gray-500 transition duration-200 hidden">
                ยกเลิก
            </button>
        </div>

        <!-- ตารางแสดงผล -->
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse text-sm">
                <thead>
                    <tr class="bg-gray-800 text-white">
                        <th class="p-3 border">วัน-เวลา</th>
                        <th class="p-3 border">Stock In</th>
                        <th class="p-3 border">Furnace Out</th>
                        <th class="p-3 border">Charcoal</th>
                        <th class="p-3 border w-48">ผู้บันทึก</th>
                        <th class="p-3 border">หมายเหตุ</th>
                        <th class="p-3 border text-center w-32">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="logTable">
                    <!-- ข้อมูลจะถูกดึงมาแสดงที่นี่ -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Script สำหรับ Database -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="gasifier_logs.js"></script>
</body>
</html>
